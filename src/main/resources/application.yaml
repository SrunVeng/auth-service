server:
  port: ${PORT:9000}

auth:
  issuer: ${AUTH_ISSUER:http://localhost:9000}
  access-token-expiration-minutes: ${ACCESS_TOKEN_MINUTES:60}

demo:
  user:
    enabled: ${DEMO_USER_ENABLED:true}
    username: ${DEMO_USERNAME:john}
    password: ${DEMO_PASSWORD:123456}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:80,http://localhost}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dcc}${DB_PARAMS:}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: never


logging:
  level:
    root: INFO

mask:
  keys: password, pinToken, pin, Token, Key
